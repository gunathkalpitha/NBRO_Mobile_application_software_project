<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBRO - Redirecting to App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .manual-link {
            margin-top: 20px;
            display: none;
        }
        .manual-link a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NBRO Field Surveyor</h1>
        <div class="spinner" id="spinner"></div>
        <p id="status">Validating authentication...</p>

        <div id="inviteForm" style="display:none; margin-top: 16px; text-align: left;">
            <p style="margin: 0 0 10px 0;"><strong>Email</strong></p>
            <p id="emailText" style="margin: 0 0 16px 0; word-break: break-all;"></p>

            <label for="passwordInput" style="display:block; margin-bottom: 8px;">Set your password</label>
            <input id="passwordInput" type="password" minlength="6" placeholder="At least 6 characters"
                style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: none; margin-bottom: 12px;" />

            <label for="confirmPasswordInput" style="display:block; margin-bottom: 8px;">Confirm password</label>
            <input id="confirmPasswordInput" type="password" minlength="6" placeholder="Re-enter password"
                style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: none; margin-bottom: 16px;" />

            <button id="setPasswordBtn"
                style="width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Set Password and Open App
            </button>
        </div>

        <div class="manual-link" id="manualLink">
            <p>If the app doesn't open automatically:</p>
            <a href="#" id="deepLink">Click here to open the app</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjzodelildlnrhijwiwv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0ic_wja7i_cZBkRgk1oQyA_rownnOKF';


        let authHash = '';
        let authQuery = '';
        let accessToken = '';
        let refreshToken = '';
        let passwordFlow = 'invite';

        function normalizeAuthType(rawType) {
            const type = (rawType || '').toLowerCase();
            if (!type) return 'invite';
            // Supabase may use signup for invite flows depending on template/flow.
            if (type === 'signup') return 'invite';
            return type;
        }

        function buildAuthHash(token, refresh, type) {
            const parts = [];
            if (token) parts.push(`access_token=${encodeURIComponent(token)}`);
            if (refresh) parts.push(`refresh_token=${encodeURIComponent(refresh)}`);
            if (type) parts.push(`type=${encodeURIComponent(type)}`);
            return parts.join('&');
        }

        function startFromTokens(token, refresh, type) {
            accessToken = token || '';
            refreshToken = refresh || '';
            const normalizedType = normalizeAuthType(type);
            authHash = buildAuthHash(accessToken, refreshToken, normalizedType);
            passwordFlow = normalizedType;

            if (!accessToken) {
                throw new Error('Missing access token in callback URL');
            }

            const payload = decodeJwtPayload(accessToken);
            const email = payload?.email || 'User';

            // Password reset flow: collect a new password on this page first.
            if (normalizedType === 'recovery') {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').textContent = 'Password reset verified. Set your new password to continue.';
                document.getElementById('emailText').textContent = email;
                document.getElementById('inviteForm').style.display = 'block';

                const btn = document.getElementById('setPasswordBtn');
                btn.textContent = 'Reset Password and Open App';
                btn.replaceWith(btn.cloneNode(true));
                document.getElementById('setPasswordBtn').addEventListener('click', setPasswordAndOpenApp);
                return;
            }

            // Invitation/signup flow: collect password first.
            if (normalizedType === 'invite') {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').textContent = 'Invitation verified. Set your password to continue.';
                document.getElementById('emailText').textContent = email;
                document.getElementById('inviteForm').style.display = 'block';

                const btn = document.getElementById('setPasswordBtn');
                btn.replaceWith(btn.cloneNode(true));
                document.getElementById('setPasswordBtn').addEventListener('click', setPasswordAndOpenApp);
                return;
            }

            // Unknown/other auth flow: continue to app callback for SDK handling.
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').textContent = 'Authentication verified. Opening app...';
            setTimeout(openApp, 1000);
        }

        function decodeJwtPayload(token) {
            try {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch {
                return null;
            }
        }

        function openApp() {
            const deepLink = authQuery
                ? `nbroapp://auth-callback?${authQuery}`
                : `nbroapp://auth-callback#${authHash}`;
            document.getElementById('deepLink').href = deepLink;
            window.location.href = deepLink;
            document.getElementById('manualLink').style.display = 'block';
        }

        async function setPasswordAndOpenApp() {
            const statusEl = document.getElementById('status');
            const buttonEl = document.getElementById('setPasswordBtn');
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;

            if (!password || password.length < 6) {
                statusEl.textContent = 'Password must be at least 6 characters.';
                return;
            }

            if (password !== confirmPassword) {
                statusEl.textContent = 'Passwords do not match.';
                return;
            }

            buttonEl.disabled = true;
            statusEl.textContent = 'Saving password...';

            try {
                const payload = {
                    password: password,
                };

                if (passwordFlow === 'invite') {
                    payload.data = {
                        invite_completed: true,
                    };
                }

                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    method: 'PUT',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(err || 'Failed to set password');
                }

                statusEl.textContent = 'Password saved. Opening app...';
                setTimeout(openApp, 600);
            } catch (error) {
                statusEl.textContent = 'Could not set password. Please try again.';
                buttonEl.disabled = false;
                console.error('Set password error:', error);
            }
        }

        function forwardPkceCodeToApp(code, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Opening app to verify reset link...';

            // PKCE exchange needs the original code_verifier that lives in app storage.
            // Forwarding the code prevents browser-side "auth code and code verifier" errors.
            authQuery = new URLSearchParams({
                code: code,
                type: type || 'recovery',
            }).toString();
            setTimeout(openApp, 700);
        }

        function forwardRecoveryErrorToApp(error, errorCode, errorDescription) {
            const statusEl = document.getElementById('status');

            authQuery = new URLSearchParams({
                type: 'recovery',
                error: error || 'access_denied',
                error_code: errorCode || 'invalid_link',
                error_description: errorDescription || 'Reset link is invalid or expired',
            }).toString();

            statusEl.textContent = 'Reset link is invalid or expired. Opening app to request a new link...';
            document.getElementById('spinner').style.display = 'none';
            setTimeout(openApp, 900);
        }

        async function verifyTokenHashFlow(tokenHash, type, email) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Verifying invitation link...';

            const normalizedType = normalizeAuthType(type);

            const body = {
                token_hash: tokenHash,
                type: normalizedType,
            };

            if (email) {
                body.email = email;
            }

            const response = await fetch(`${SUPABASE_URL}/auth/v1/verify`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body),
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error_description || data.msg || 'Failed to verify invitation link');
            }

            const token = data.access_token || data.session?.access_token || '';
            const refresh = data.refresh_token || data.session?.refresh_token || '';

            if (!token) {
                throw new Error('Verification succeeded but no access token was returned');
            }

            startFromTokens(token, refresh, normalizedType);
        }

        function setupInvitePage() {
            try {
                const statusEl = document.getElementById('status');
                // Check for code parameter (password reset PKCE flow)
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const queryType = urlParams.get('type') || '';
                const queryToken = urlParams.get('access_token') || '';
                const queryRefresh = urlParams.get('refresh_token') || '';
                const tokenHash = urlParams.get('token_hash') || urlParams.get('token') || '';
                const email = urlParams.get('email') || '';
                const queryError = urlParams.get('error') || '';
                const queryErrorCode = urlParams.get('error_code') || '';
                const queryErrorDescription = urlParams.get('error_description') || '';

                // Check for hash fragment first (standard implicit flow)
                const hash = window.location.hash.substring(1);
                if (hash) {
                    const hashParams = new URLSearchParams(hash);
                    const hashToken = hashParams.get('access_token') || '';
                    const hashRefresh = hashParams.get('refresh_token') || '';
                    const hashType = hashParams.get('type') || queryType;
                    const hashError = hashParams.get('error') || queryError;
                    const hashErrorCode = hashParams.get('error_code') || queryErrorCode;
                    const hashErrorDescription = hashParams.get('error_description') || queryErrorDescription;

                    if (hashError || hashErrorCode) {
                        const normalizedHashType = normalizeAuthType(hashType || queryType);
                        if (normalizedHashType === 'recovery') {
                            forwardRecoveryErrorToApp(hashError, hashErrorCode, hashErrorDescription);
                            return;
                        }

                        document.getElementById('spinner').style.display = 'none';
                        statusEl.textContent = hashErrorDescription || 'Authentication link is invalid or expired.';
                        document.getElementById('manualLink').style.display = 'block';
                        return;
                    }

                    if (hashToken) {
                        startFromTokens(hashToken, hashRefresh, hashType);
                        return;
                    }
                }

                if (queryError || queryErrorCode) {
                    const normalizedQueryType = normalizeAuthType(queryType);
                    if (normalizedQueryType === 'recovery') {
                        forwardRecoveryErrorToApp(queryError, queryErrorCode, queryErrorDescription);
                        return;
                    }

                    document.getElementById('spinner').style.display = 'none';
                    statusEl.textContent = queryErrorDescription || 'Authentication link is invalid or expired.';
                    document.getElementById('manualLink').style.display = 'block';
                    return;
                }

                // Some flows return tokens in query string instead of hash.
                if (queryToken) {
                    startFromTokens(queryToken, queryRefresh, queryType);
                    return;
                }
                
                if (code) {
                    const normalizedQueryType = normalizeAuthType(queryType);

                    if (normalizedQueryType === 'recovery') {
                        console.log('Password reset code detected, forwarding to app for PKCE exchange...');
                        forwardPkceCodeToApp(code, queryType);
                        return;
                    }

                    // Invitation/signup links should stay on this page.
                    // If Supabase sends only `code` (without token_hash/tokens), we cannot verify invite in-browser.
                    // Keep user on page and show what needs to be adjusted in email template.
                    authQuery = new URLSearchParams({
                        code: code,
                        type: queryType || 'invite',
                    }).toString();
                    document.getElementById('deepLink').href = `nbroapp://auth-callback?${authQuery}`;
                    document.getElementById('spinner').style.display = 'none';
                    statusEl.textContent = 'Invitation link received, but this link format cannot be completed on web. Please ask admin to use invite link with token_hash, or open this link from the mobile app.';
                    document.getElementById('manualLink').style.display = 'block';
                    return;
                }

                if (tokenHash) {
                    verifyTokenHashFlow(tokenHash, queryType, email).catch((error) => {
                        console.error('Token-hash verification failed:', error);
                        statusEl.textContent = `Failed to verify link: ${error.message}`;
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('manualLink').style.display = 'block';
                    });
                    return;
                }

                statusEl.textContent = 'No authentication data received. Please use the latest invitation email link.';
                console.error('No hash, query tokens, code, or token_hash found in URL');
            } catch (error) {
                console.error('Redirect error:', error);
                document.getElementById('status').textContent = 
                    'An error occurred. Please try again or request a new link.';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('manualLink').style.display = 'block';
            }
        }
        
        window.addEventListener('load', setupInvitePage);
    </script>
</body>
</html>
