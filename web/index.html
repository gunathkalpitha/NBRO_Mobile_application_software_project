  <script>
    // Handle Supabase auth callback by redirecting to /auth-callback route
    // This preserves the hash parameters that Supabase uses for token exchange
    window.addEventListener('load', function() {
      const url = new URL(window.location);
      const hash = url.hash;
      
      // Check if this is a Supabase auth callback (has access_token in hash)
      if (hash.includes('access_token') || hash.includes('error')) {
        // Redirect to our auth-callback route while preserving hash for Supabase SDK
        if (!window.location.pathname.includes('/auth-callback')) {
          window.location.href = '/auth-callback' + hash;
        }
      }
    });
  </script>
</head>

</body>
